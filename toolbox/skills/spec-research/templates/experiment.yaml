# Experiment Definition Template
# /spec research experiment で自動生成される

name: "{experiment-name}"
created_at: "{date}"

# 元の仮説
hypothesis:
  id: "H-{seq}"
  statement: "{仮説文}"
  evidence: "{observationsからの根拠}"
  ice_score:
    impact: 0
    confidence: 0
    ease: 0

# 実験設計
experiment:
  type: "ab_test"  # ab_test | before_after | feature_flag | refactor

  # A/B テストの場合
  variants:
    control:
      description: "現状維持"
    treatment:
      description: "{変更内容}"

  # 対象範囲
  scope:
    files: []          # 変更対象ファイル（予測）
    components: []     # 影響コンポーネント
    feature_flag: ""   # feature flag 名（空なら自動生成）

# 成功基準
success_criteria:
  primary_metric: "{主要メトリクス}"
  target: "{目標値}"
  secondary_metrics:
    - name: "{副次メトリクス}"
      threshold: "{許容範囲}"

# 安全基準（これを満たさなければ即棄却）
guardrails:
  - metric: "test_pass_rate"
    condition: ">= 100%"
  - metric: "performance_regression"
    condition: "< 20%"
  - metric: "accessibility_score"
    condition: ">= current"

# メタデータ
metadata:
  branch: "exp/{experiment-name}"
  pr: null             # PR 作成後に自動記入
  status: "designed"   # designed | implementing | analyzing | decided
  result: null         # confirmed | rejected | inconclusive
  confidence: null     # 0.0 - 1.0
