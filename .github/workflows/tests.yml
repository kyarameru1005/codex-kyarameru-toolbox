name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: scripts/gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run regex secret check
        run: bash scripts/secret-check.sh --patterns-only

  harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run harness
        run: bash scripts/harness.sh

  agents-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository AGENTS.md
        run: |
          bash toolbox/skills/agents-md-writer/scripts/check_agents_md.sh AGENTS.md

      - name: Validate global AGENTS.md template
        run: |
          bash toolbox/skills/agents-md-writer/scripts/check_agents_md.sh toolbox/AGENTS.md
