name: discord-notify

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      status:
        description: "通知ステータス"
        required: true
        default: "info"
        type: choice
        options:
          - info
          - started
          - progress
          - success
          - failure
      summary:
        description: "通知サマリ"
        required: true
      link:
        description: "任意の詳細URL"
        required: false

jobs:
  notify-main-push:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ https://discord.com/api/webhooks/1489499504330674329/zjXcIMd_Cie0G38Gdq36e9kafucFWENPtnSLP-Edh5elsFAI2HhtgcWnj0ilV-AAmHld }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_WEBHOOK_URL is not configured. Notification skipped."
            exit 0
          fi
          bash scripts/notify-discord.sh \
            --status "success" \
            --project "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --summary "mainへpush: ${COMMIT_MESSAGE}" \
            --link "${RUN_URL}"

  notify-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "DISCORD_WEBHOOK_URL is not configured. Notification skipped."
            exit 0
          fi
          bash scripts/notify-discord.sh \
            --status "${{ github.event.inputs.status }}" \
            --project "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --summary "${{ github.event.inputs.summary }}" \
            --link "${{ github.event.inputs.link }}"
