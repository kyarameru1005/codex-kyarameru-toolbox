title = "kyarameru-tool-box gitleaks config"

[allowlist]
description = "Exclude generated/vendor paths from secret scanning"
paths = [
  '''^\.venv/''',
  '''^ai_log/''',
  '''^toolbox/sessions/''',
  '''^toolbox/vendor_imports/''',
  '''^toolbox/plugins/cache/''',
  '''^toolbox/cache/''',
  '''^toolbox/tmp/''',
  '''^toolbox/log/''',
  '''^toolbox/\.codex/''',
  '''^toolbox/\.tmp/''',
]
